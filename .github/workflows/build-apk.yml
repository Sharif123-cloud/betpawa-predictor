name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install server-side ML dependencies
        run: pip install numpy xgboost scikit-learn requests beautifulsoup4 pandas

      - name: Run data pipeline and generate predictions.json
        run: |
          python scraper.py
          python clean.py
          python train.py
          python predict.py --generate
          echo "--- predictions.json head ---"
          head -20 predictions.json
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}

      - name: Install Buildozer system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v3-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v3-

      - name: Install Buildozer (cython 0.29.33 is required for kivy 2.1.0)
        run: pip install buildozer "cython==0.29.33"

      - name: Build APK
        run: buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Verify APK was created
        run: |
          ls -lh bin/
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then echo "ERROR: No APK in bin/" && exit 1; fi
          cp "$APK" "bin/BetPawa-Predictor-v1.0.${{ github.run_number }}.apk"
          echo "APK_PATH=bin/BetPawa-Predictor-v1.0.${{ github.run_number }}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: BetPawa-Predictor-APK
          path: bin/BetPawa-Predictor-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BetPawa Predictor v1.0.${{ github.run_number }}"
          body: |
            ## ⚽ BetPawa Predictor APK — ready to install

            ### Install on Android
            1. Download **BetPawa-Predictor-v1.0.${{ github.run_number }}.apk** below
            2. On your phone: **Settings → Security → Unknown sources → Enable**
            3. Open the `.apk` → tap **Install**

            ### What's inside
            - XGBoost predictions pre-generated for 45-day window
            - Dark UI with per-match confidence bars and odds hints
            - Home / History / About screens
            - About: Sserunjogi Sharif · 0787816686

            ### How to use
            Open the app → enter any date → tap **GET PREDICTIONS**

          files: bin/BetPawa-Predictor-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
