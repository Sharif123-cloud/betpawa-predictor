name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9.25
        uses: actions/setup-python@v5
        with:
          python-version: "3.9.25"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install server-side ML dependencies
        run: pip install numpy "xgboost>=1.7.0,<2.0.0" scikit-learn requests beautifulsoup4 pandas

      - name: Run data pipeline and generate predictions.json
        run: |
          python scraper.py
          python clean.py
          python train.py
          python predict.py --generate
          echo '--- predictions.json head ---'
          head -20 predictions.json
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}

      # apt-get must run BEFORE we override /usr/bin/python3
      - name: Install system build dependencies for buildozer
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            build-essential ccache \
            autoconf automake libtool \
            pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev libltdl-dev

      # Override /usr/bin/python3 AFTER apt-get so system tools still work.
      # p4a internally calls 'python3' to detect hostpython3 version —
      # without this it finds the runner's system Python 3.14.x, not our 3.9.25.
      - name: Override system python3 to point to 3.9.25
        run: |
          PY=$(which python3)
          sudo ln -sf "$PY" /usr/bin/python3
          sudo ln -sf "$PY" /usr/bin/python
          echo "python3 is now: $(/usr/bin/python3 --version)"

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-native-py3925-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-native-py3925-v2-

      - name: Install Cython 0.29.37 and buildozer 1.5.0
        run: |
          pip install --upgrade pip
          pip install "cython==0.29.37" "buildozer==1.5.0"

      - name: Build APK
        run: buildozer -v android debug 2>&1

      - name: Verify APK was created
        run: |
          ls -lh bin/ || (echo 'ERROR: bin/ missing' && exit 1)
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          [ -z "$APK" ] && echo 'ERROR: No APK found' && exit 1
          cp "$APK" "bin/BetPawa-Predictor-v1.0.${{ github.run_number }}.apk"
          echo "APK_PATH=bin/BetPawa-Predictor-v1.0.${{ github.run_number }}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: BetPawa-Predictor-APK
          path: bin/BetPawa-Predictor-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BetPawa Predictor v1.0.${{ github.run_number }}"
          body: |
            ## BetPawa Predictor APK — ready to install

            ### Install on Android
            1. Download **BetPawa-Predictor-v1.0.${{ github.run_number }}.apk** below
            2. On your phone: **Settings → Security → Unknown sources → Enable**
            3. Open the `.apk` → tap **Install**

            ### Features
            - XGBoost predictions pre-generated for a 45-day window
            - Dark UI with confidence bars and odds hints
            - Home / History / About screens
            - Enter any date → tap GET PREDICTIONS

            ### Developer
            Sserunjogi Sharif · 0787816686
          files: bin/BetPawa-Predictor-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
