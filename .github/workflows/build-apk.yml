name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies (server-side only)
        run: pip install numpy xgboost scikit-learn requests beautifulsoup4 pandas

      - name: Run data pipeline and generate predictions.json
        run: |
          python scraper.py
          python clean.py
          python train.py
          python predict.py --generate
          echo "=== predictions.json preview ==="
          head -30 predictions.json
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}

      - name: Install Buildozer system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v2-

      - name: Install Buildozer and Cython
        run: pip install buildozer cython==0.29.36

      - name: Build APK
        run: buildozer android debug 2>&1
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Rename APK
        run: |
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" "bin/BetPawa-Predictor-v1.0.${{ github.run_number }}.apk"
            echo "APK built: $APK"
          else
            echo "ERROR: No APK found in bin/" && exit 1
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetPawa-Predictor-APK
          path: bin/BetPawa-Predictor-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BetPawa Predictor v1.0.${{ github.run_number }}"
          body: |
            ## ⚽ BetPawa Predictor APK

            ### Install on Android
            1. Download **BetPawa-Predictor-v1.0.${{ github.run_number }}.apk** below
            2. Phone: **Settings → Security → Unknown sources → Enable**
            3. Open the `.apk` file → tap **Install**

            ### What's inside
            - XGBoost model trained on latest scraped match data
            - Predictions pre-generated for 45-day window (past 7 + next 38 days)
            - Dark UI with confidence bars and odds hints
            - About screen: Sserunjogi Sharif · 0787816686

            ### Usage
            Open app → enter any date in range → tap **GET PREDICTIONS**

          files: bin/BetPawa-Predictor-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
