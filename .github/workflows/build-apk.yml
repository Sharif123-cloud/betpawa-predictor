name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install server-side ML dependencies
        run: pip install numpy "xgboost>=1.7.0,<2.0.0" scikit-learn requests beautifulsoup4 pandas

      - name: Run data pipeline and generate predictions.json
        run: |
          python scraper.py
          python clean.py
          python train.py
          python predict.py --generate
          echo "--- predictions.json head ---"
          head -20 predictions.json
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}

      - name: Cache Buildozer Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/buildozer-cache
          key: ${{ runner.os }}-buildozer-docker-v2-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-docker-v2-

      - name: Build APK using kivy/buildozer Docker image
        run: |
          # The kivy/buildozer image has a stable, pinned toolchain (Python 3.11 for Android)
          # that avoids the 'cgi' removal in Python 3.13+
          docker run --rm \
            -v "$(pwd)":/home/user/hostcwd \
            -v /tmp/buildozer-cache:/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug 2>&1

      - name: Verify APK was created
        run: |
          ls -lh bin/ || (echo "ERROR: bin/ directory missing" && exit 1)
          APK=$(ls bin/*.apk 2>/dev/null | head -1)
          if [ -z "$APK" ]; then echo "ERROR: No APK in bin/" && exit 1; fi
          cp "$APK" "bin/BetPawa-Predictor-v1.0.${{ github.run_number }}.apk"
          echo "APK_PATH=bin/BetPawa-Predictor-v1.0.${{ github.run_number }}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact (90-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: BetPawa-Predictor-APK
          path: bin/BetPawa-Predictor-*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "BetPawa Predictor v1.0.${{ github.run_number }}"
          body: |
            ## BetPawa Predictor APK — ready to install

            ### Install on Android
            1. Download **BetPawa-Predictor-v1.0.${{ github.run_number }}.apk** below
            2. On your phone: **Settings → Security → Unknown sources → Enable**
            3. Open the `.apk` → tap **Install**

            ### What's inside
            - XGBoost predictions pre-generated for 45-day window
            - Dark UI with per-match confidence bars and odds hints
            - Home / History / About screens
            - Developer: Sserunjogi Sharif · 0787816686

            ### How to use
            Open the app → enter any date → tap **GET PREDICTIONS**

          files: bin/BetPawa-Predictor-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
